<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OgradyCore</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OgradyCore">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#0f542c">
  <meta name="description" content="O'Grady Coatings AI Forecasting Platform">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a3520;
      color: #e8f5ee;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }
    .icon-wrap {
      width: 120px;
      height: 120px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 0 0 1.5px rgba(255,255,255,0.15), 0 8px 32px rgba(0,0,0,0.5);
    }
    .icon-wrap img { width: 100%; height: 100%; object-fit: cover; }
    h1 { font-size: 28px; font-weight: 700; color: #ffffff; letter-spacing: -0.5px; }
    .tagline { font-size: 13px; color: #6ab584; letter-spacing: 0.5px; text-transform: uppercase; }
    p.sub { font-size: 15px; color: #a8d5b8; text-align: center; max-width: 260px; line-height: 1.5; }
    .open-btn {
      display: inline-block;
      margin-top: 8px;
      padding: 14px 40px;
      background: #1a7844;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      text-decoration: none;
      border: 1.5px solid rgba(255,255,255,0.2);
      transition: background 0.15s;
    }
    .open-btn:hover { background: #21904f; }
    #install-btn {
      display: none;
      padding: 10px 28px;
      background: transparent;
      color: #6ab584;
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid #6ab584;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #install-btn:hover { background: rgba(106,181,132,0.12); }
    .hint { font-size: 12px; color: #3d6b50; text-align: center; max-width: 280px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="icon-wrap">
    <img src="icon-192.png" alt="OgradyCore icon">
  </div>
  <h1>OgradyCore</h1>
  <div class="tagline">Craft · Create · Inspire</div>
  <p class="sub">O'Grady Coatings AI Forecasting Platform</p>
  <a class="open-btn" href="https://ogradycore.streamlit.app/" target="_blank" rel="noopener">Open App</a>
  <button id="install-btn">⬇ Add to Home Screen</button>
  <p class="hint" id="hint-text">
    On mobile: tap <strong>Share → Add to Home Screen</strong> to install.<br>
    On desktop: look for the install icon in your browser's address bar.
  </p>
  <script>
    let deferredPrompt = null;
    const installBtn = document.getElementById('install-btn');
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.style.display = 'inline-block';
      document.getElementById('hint-text').style.display = 'none';
    });
    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      if (outcome === 'accepted') installBtn.style.display = 'none';
    });
    window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });

  </script>
</body>
</html>
